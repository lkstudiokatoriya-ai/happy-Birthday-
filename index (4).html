<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITICAL SYSTEM OVERRIDE</title>
    <style>
        /* डार्क हैकर थीम */
        body {
            background-color: #050505;
            margin: 0;
            padding: 0;
            overflow: hidden; /* स्क्रॉल बंद */
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            /* बैकग्राउंड में मैट्रिक्स जैसी जालीदार लाइनें */
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* लाल/हरा बॉर्डर जो स्क्रीन को खतरे का लुक दे */
        body::before {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 60px rgba(255, 0, 0, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        /* टर्मिनल जहाँ मैसेज आएंगे */
        #terminal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* मैसेज नीचे से ऊपर जाएंगे */
            z-index: 5;
        }

        /* मैसेज की स्टाइलिंग */
        .msg-line {
            margin: 2px 0;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            word-wrap: break-word;
            text-transform: uppercase;
            /* हल्का सा ग्लिच इफ़ेक्ट (हिलने वाला) */
            animation: glitch 0.3s linear infinite;
        }

        /* मोबाइल के लिए फॉन्ट एडजस्टमेंट */
        @media (max-width: 600px) {
            .msg-line {
                font-size: 12px;
                letter-spacing: 0px;
            }
            #alert-box {
                width: 85%;
                padding: 15px;
            }
            #alert-box h1 {
                font-size: 22px;
            }
            #alert-box p {
                font-size: 14px;
            }
        }

        /* चमकदार रंग */
        .red { color: #ff003c; text-shadow: 0 0 10px #ff003c, 0 0 20px #ff0000; }
        .green { color: #00ff41; text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff00; }
        .white { color: #f8f8f8; text-shadow: 0 0 10px #ffffff, 0 0 20px #cccccc; }

        /* ग्लिच एनिमेशन - टेक्स्ट को हल्का सा हिलाने के लिए */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        /* स्क्रीन के बीच में बड़ा सा अलर्ट बॉक्स */
        #alert-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #ff003c;
            background: rgba(0, 0, 0, 0.85);
            color: #ff003c;
            padding: 25px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 0 40px #ff003c;
            /* ब्लिंक करने का एनिमेशन */
            animation: blink 0.4s infinite alternate;
            border-radius: 5px;
        }

        #alert-box h1 {
            margin: 0 0 15px 0;
            font-size: 28px;
            text-shadow: 0 0 15px #ff003c;
        }

        #alert-box p {
            margin: 5px 0;
            font-size: 16px;
            color: white;
            text-shadow: 0 0 5px white;
            font-weight: bold;
        }

        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 50px #ff003c; }
            to { opacity: 0.3; box-shadow: 0 0 10px #ff003c; }
        }

    </style>
</head>
<body>

    <!-- बीच में चेतावनी बॉक्स (हिंदी और अंग्रेजी में) -->
    <div id="alert-box">
        <h1>⚠️ WARNING ⚠️</h1>
        <p>SYSTEM HACKED!</p>
        <p>⚠️ सिस्टम हैक हो चुका है! ⚠️</p>
        <p>DO NOT TURN OFF YOUR PHONE</p>
        <p>अपना फोन बंद न करें!</p>
    </div>

    <!-- पीछे चलने वाले मैसेज -->
    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        const alertBox = document.getElementById('alert-box');
        
        const colors = ['red', 'green', 'white'];
        
        // हैकर वाले डरावने मैसेज (हिंदी और अंग्रेजी दोनों)
        const messages = [
            "EXTRACTING PRIVATE DATA... 99% COMPLETE",
            "HAPPY BIRTHDAY HAPPY BIRTHDAY HAPPY BIRTHDAY!!!",
            "OVERRIDING SECURITY PROTOCOLS... FAILED!",
            "फ़ोन का सारा डेटा चोरी हो रहा है... ⚠️",
            "████████████████ 100% CORRUPTED!",
            "जन्मदिन मुबारक हो!!! 🎉🎁",
            "01001000 01000001 01010000 01010000 01011001", // बाइनरी में HAPPY
            "SYSTEM FAILURE IMMINENT... HAPPY BIRTHDAY!",
            ">_ ACCESS GRANTED: SURPRISE_MODE=ON",
            "सावधान! सिस्टम ओवरलोड हो रहा है!",
            "HAPPY B'DAY!!! HAPPY B'DAY!!! HAPPY B'DAY!!!"
        ];

        // 4 सेकंड बाद बीच वाला डरावना अलर्ट बदलकर हैप्पी बर्थडे हो जाएगा
        setTimeout(() => {
            alertBox.innerHTML = `
                <h1 style="color: #00ff41; text-shadow: 0 0 15px #00ff41;">🎉 HAPPY B'DAY! 🎉</h1>
                <p style="color: #00ff41;">YOU HAVE BEEN PRANKED!</p>
                <p style="color: #00ff41;">तुम्हारे साथ प्रैंक हुआ है! 😂</p>
                <p style="color: white; font-size: 14px; margin-top:10px;">Party Toh Banti Hai!</p>
            `;
            alertBox.style.borderColor = "#00ff41";
            alertBox.style.boxShadow = "0 0 40px #00ff41";
            // ब्लिंक इफ़ेक्ट को हरा कर देंगे
            alertBox.style.animation = "blinkGreen 0.6s infinite alternate";
        }, 4000);

        // हरे ब्लिंक के लिए डायनामिक CSS जोड़ना
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes blinkGreen {
                from { opacity: 1; box-shadow: 0 0 50px #00ff41; }
                to { opacity: 0.5; box-shadow: 0 0 10px #00ff41; }
            }
        `;
        document.head.appendChild(styleSheet);

        window.onload = function() {
            // मैसेज की स्पीड तेज़ है (हर 20 मिलीसेकंड)
            setInterval(() => {
                const newLine = document.createElement('div');
                
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                
                // रैंडम मेमोरी एड्रेस जैसा लुक देने के लिए (उदा. 0x7F8B2:)
                const randomHex = "0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(6, '0') + " > ";

                newLine.className = `msg-line ${randomColor}`;
                newLine.innerText = randomHex + randomMsg;
                
                terminal.appendChild(newLine);

                // पुरानी लाइन्स को हटाना (ताकि फ़ोन क्रैश न हो)
                if (terminal.childElementCount > 50) {
                    terminal.removeChild(terminal.firstChild);
                }
            }, 20); 
        };
    </script>
</body>
</html>
